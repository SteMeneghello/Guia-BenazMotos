<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Benaz Motos</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏍️</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <svg width="0" height="0" style="position: absolute; pointer-events: none;">
        <filter id="suzukifilter">
            <feColorMatrix type="matrix" values="
                0    0    0   0   1
               -1.5  1.5  0   0   1
               -1.5  0    1.5 0   1
                0    0    0   1   0" />
        </filter>
    </svg>

    <button class="theme-toggle" onclick="toggleTheme()" title="Acender/Apagar a luz">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
            <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"></path>
            <path d="M9 18h6"></path>
            <path d="M10 22h4"></path>
        </svg>
    </button>

    <div class="container">
        <img src="https://i.postimg.cc/rmjRvR3f/Logo-Benaz.png" alt="Logo Benaz" style="width: 130px; margin-bottom: 5px;">
        <h1>📍Qual a unidade mais próxima?</h1>
        <p class="subtitulo">Digite a cidade do lead e localize a concessionária mais próxima.</p>
        
        <input type="text" id="cityInput" placeholder="Ex: Urupês, SP" onkeypress="if(event.key === 'Enter') calculateDistance()" autofocus>
        <button class="btn-verificar" onclick="calculateDistance()">Verificar Unidade</button>
        
        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
